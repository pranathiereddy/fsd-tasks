<!--
7. Typography
Exercise 7.1:
Create a sample page with different Bootstrap typography utilities: display-1, lead, text-muted,
fw-bold, etc.
Exercise 7.2:
Use text-uppercase, text-lowercase, text-capitalize.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typography</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1 class="display-1">This is display 1</h1>
        <h1 class="lead">This is a lead paragraph.</h1>
        <h1 class="text-muted">This is a muted paragraph.</h1>
        <h1 class="fw-bold">This is a bold paragraph.</h1>
        <h1 class="text-uppercase">This is an uppercase paragraph.</h1>
        <h1 class="text-lowercase">This is a lowercase paragraph.</h1>
        <h1 class="text-capitalize">This is a capitalized paragraph.</h1>
    </div>
</body>
</html>
