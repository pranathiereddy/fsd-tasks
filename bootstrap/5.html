<!--
5. Alignment and Reordering in Grid
Exercise 5.1:
Use justify-content-center and align-items-center to center content inside a row.
Exercise 5.2:
Reorder columns on different screen sizes using order-md-2, order-md-1.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Alignment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class = "container mt-20">
        <div class="row justify-content-center align-items-center mb-4" style="height: 200px;">
            <div class="col-md-4 bg-primary text-white p-4 m-4 order-lg-2">
                <h4>Centered Column 1</h4>
            </div>
            <div class="col-md-4 bg-primary text-white p-4 m-4 order-lg-1">
                <h4>Centered Column 2</h4>
            </div>
            <div class="col-md-4 bg-primary text-white p-4 m-4 order-lg-3">
                <h4>Centered Column 3</h4>
            </div>

        </div>

    </div>
</body>
</html>
