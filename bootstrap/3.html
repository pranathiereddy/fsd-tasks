<!-- Exercise 3.1:
Create a container with three columns that stack vertically on mobile, two-per-row on tablets,
and three-per-row on desktops. 
Exercise 3.2:
Use .container, .row, and .col-* classes appropriately for responsive design
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
<body>
    <h1>Bootstrap</h1>
    <div class="container">
        <div class="row">
            <div class="col-sm-6 col-md-4">
                <div class="p-3 border bg-light">Column 1</div>
            </div>
            <div class="col-sm-6 col-md-4">
                <div class="p-3 border bg-light">Column 2</div>
            </div>
            <div class="col-sm-12 col-md-4">
                <div class="p-3 border bg-light">Column 3</div>
            </div>  
    </div>
</body>
</html>
