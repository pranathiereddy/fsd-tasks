<!-- 
13. Colors and Backgrounds
Exercise 13.1:
Create a dashboard page using contextual background classes (bg-primary, bg-warning, etc.) and
text colors.
Exercise 13.2:
Use bg-gradient with bg-dark and white text. 
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colors and Backgrounds</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
            <div class="bg-primary text-white p-4 m-2">
                <h4>Primary Background</h4>
            </div>
            <div class="bg-warning text-dark p-4 m-2">  
                <h4>Warning Background</h4>
            </div>
            <div class="bg-success text-white p-4 m-2">  
                <h4>Success Background</h4>
            </div>
        
            <div class="bg-gradient bg-dark text-white p-4 m-2">
                <h4>Gradient Dark Background</h4>
            </div>
        </div>
    </div>
    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script> -->
</body>
