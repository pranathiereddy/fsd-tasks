<!-- 
16. Positioning Utilities
Exercise 16.1:
Create a fixed footer using position-fixed bottom-0.
Exercise 16.2:
Use position-relative and position-absolute to overlay a badge over an image.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positioning Utilities</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">

        <h1>Positioning Utilities</h1>
        <div class="position-fixed bottom-0">
            Fixed footer.
        </div>

        <div class="position-relative">
            <img src="https://www.pngfind.com/pngs/m/172-1726619_basic-high-res-logo-basic-magazine-logo-png.png" alt="Sample Image" class="img-fluid">
        </div>
    </div>
</body>
</html>
