<!--
11. Cards and Media Objects
Exercise 11.1:
Create a profile card using card, card-body, card-title, and card-img-top.
Exercise 11.2:
Design a media object layout using media and align an image to the left of the content
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Flexbox Utilities</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <div class="card mb-4" style="width: 18rem;">
            <img src="" class="card-img-top" alt="Profile Image">
            <div class="card-body">
                <h5 class="card-title">Maxine Mayfield</h5>
                <p class="card-text">Exploration enthusiast with a passion to save the world without any superpowers.</p>
                <p class="card-text">Role: Eleven's best friend</p>
                <a href="#" class="btn btn-dark">Gift Superpowers</a>
            </div>
        </div>
        <div class="card d-flex justify-content-between align-items-center p-4">
            <h4>Title</h4>
            <p>Content</p>
            <button class="btn btn-dark">Action</button>
        </div>
    </div>
    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script> -->
</body>
</html>
