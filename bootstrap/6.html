<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Flexbox Utilities</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <nav class="d-flex flex-column flex-md-row m-4">
            <a href="#" class="p-2 text-white bg-dark m-2 text-decoration-none">Home</a>
            <a href="#" class="p-2 text-white bg-dark m-2 text-decoration-none">About</a>
            <a href="#" class="p-2 text-white bg-dark m-2 text-decoration-none">Services</a>
            <a href="#" class="p-2 text-white bg-dark m-2 text-decoration-none">Contact</a>
        </nav>

        <div class="card d-flex justify-content-between align-items-center p-4">
            <h4>Title</h4>
            <p>Content</p>
            <button class="btn btn-dark">Action</button>
        </div>
    </div>

</body>
</html>
