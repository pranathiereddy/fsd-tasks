<!--
9. Buttons
Exercise 9.1:
Create buttons using all contextual classes: btn-primary, btn-secondary, btn-outline-*, etc.
Exercise 9.2:
Add button groups using btn-group, and create toggle buttons with checkboxes.
-->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buttons</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container m-4">
        <div class="row m-2">
            <div class="col m-2">
                <div class="row m-2">
                    <button class="btn btn-primary m-1">Primary</button>
                    <button class="btn btn-secondary m-1">Secondary</button>
                    <button class="btn btn-success m-1">Success</button>
                    <button class="btn btn-danger m-1">Danger</button>
                    <button class="btn btn-warning m-1">Warning</button>
                    <button class="btn btn-info m-1">Info</button>
                    <button class="btn btn-light m-1">Light</button>
                    <button class="btn btn-dark m-1">Dark</button>
                </div>
            </div>
            <div class="col m-2">
                <div class="row m-2">
                    <button class="btn btn-outline-primary m-1">Outline Primary</button>
                    <button class="btn btn-outline-secondary m-1">Outline Secondary</button>
                    <button class="btn btn-outline-success m-1">Outline Success</button>
                    <button class="btn btn-outline-danger m-1">Outline Danger</button>
                    <button class="btn btn-outline-warning m-1">Outline Warning</button>
                    <button class="btn btn-outline-info m-1">Outline Info</button>
                    <button class="btn btn-outline-light m-1 text-dark">Outline Light</button>
                    <button class="btn btn-outline-dark m-1">Outline Dark</button>
                </div>
            </div>
        </div>

    </div>

    <div class="container m-4">
        <div class="btn-group" role="group">
            <button type="button" class="btn btn-primary b-1">one</button>
            <button type="button" class="btn btn-primary b-1">two</button>
            <button type="button" class="btn btn-primary b-1">three</button>
            <button type="button" class="btn btn-primary b-1">four</button>
            <button type="button" class="btn btn-primary b-1">five</button>
            <button type="button" class="btn btn-primary b-1">six</button>
        </div>
        <div class="btn-group" role="group">
            <input type="checkbox" class="btn-check" id="btn-check-1">
            <label class="btn btn-primary b-1" for="btn-check-1">one</label>
        </div>
</body>

</html>
