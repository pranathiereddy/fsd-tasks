<!-- 
4. Column Layouts and Grid Classes
Exercise 4.1:
Design a two-column layout with a sidebar (col-md-3) and content area (col-md-9).
Exercise 4.2:
Create a four-column layout (col-sm-3) with equal width.
 -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Column Layouts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col-md-3 bg-dark text-white p-4">
                <h4>Sidebar</h4>
                <p>Sidebar content.</p>
            </div>
            <div class="col-md-9 bg-secondary text-white p-4">  
                <h4>Content Area</h4>
                <p>Content.</p>
            </div>
        </div>
        <div class="row">
            <div class="col-sm-3 bg-primary text-white p-4">
                <h4>Column 1</h4>
                <p>Content</p>
            </div>
            <div class="col-sm-3 bg-success text-white p-4">
                <h4>Column 2</h4>
                <p>Content</p>
            </div>  
            <div class="col-sm-3 bg-danger text-white p-4">
                <h4>Column 3</h4>
                <p>Content</p>
            </div>
            <div class="col-sm-3 bg-warning text-dark p-4">
                <h4>Column 4</h4>
                <p>Content</p>
            </div>
        </div>
    </div>
    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script> -->
</body>
</html>
