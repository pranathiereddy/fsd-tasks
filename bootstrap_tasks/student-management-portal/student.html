<!DOCTYPE html>
<html>
<head>

  <title>Student Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-secondary mb-5">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="home.html">
        <img src="https://cvr.ac.in" alt="CVR Logo" style="height: 40px; width: auto; object-fit: contain;">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav mx-auto">
          <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link active" href="profile.html">Profile</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mb-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        
        <div class="card shadow-sm border-0">
          
          <div class="bg-secondary text-center rounded-top" style="height: 100px;"></div>
          
          <div class="card-body text-center pt-0">
            
            <img src="" 
                 alt="Student Profile Photo" 
                 class="img-fluid rounded-circle border border-4 border-white shadow-sm mb-3" 
                 style="width: 130px; height: 130px; object-fit: cover; margin-top: -65px;">

            <h3 class="card-title mb-1 text-dark fw-bold">John Doe</h3>
            <p class="text-muted mb-0 fw-semibold text-uppercase small tracking-wide">Information Technology (IT)</p>
            <span class="badge bg-light text-secondary border border-secondary rounded-pill px-3 py-1 my-2 font-monospace">1</span>
            
            <hr class="my-4 text-muted opacity-25">

            <div class="text-start px-2">
              
              <div class="mb-3">
                <label class="text-uppercase text-muted fw-bold small d-block mb-1">Email Address</label>
                <div class="p-2 bg-light rounded text-dark font-monospace text-truncate">john@cvr.ac.in</div>
              </div>

              <div class="mb-4">
                <label class="text-uppercase text-muted fw-bold small d-block mb-1">Mobile Number</label>
                <div class="p-2 bg-light rounded text-dark font-monospace">+91 9876543210</div>
              </div>
              
            </div>

            <div class="d-grid gap-2 mt-4">
              <button type="button" class="btn btn-secondary py-2 fw-semibold">Edit Profile</button>
              <a href="dashboard.html" class="btn btn-outline-secondary py-2 text-decoration-none">Back to Dashboard</a>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
