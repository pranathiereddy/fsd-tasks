<html>
<head>
  <title>3</title>
  <style>

    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      padding: 16px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .item {
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 6px 16px rgba(0,0,0,0.06);
    }

    .item img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
    }

    @media (max-width: 900px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      .gallery {
        grid-template-columns: 1fr;
      }

      .item img {
        height: 220px;
      }
    }
  </style>
</head>
<body>
  <div class="gallery">
    <div class="item"><img src="" alt="Image 1" /></div>
    <div class="item"><img src="" alt="Image 2" /></div>
    <div class="item"><img src="" alt="Image 3" /></div>
    <div class="item"><img src="" alt="Image 4" /></div>
    <div class="item"><img src="" alt="Image 5" /></div>
    <div class="item"><img src="" alt="Image 6" /></div>
    <div class="item"><img src="" alt="Image 7" /></div>
    <div class="item"><img src="" alt="Image 8" /></div>
  </div>
</body>
</html>
