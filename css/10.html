<html>
    <head>
        <title>10</title>
        <style>
        .ball-container {
            width: 100%;
            max-width: 600px;
            position: relative;
            padding-bottom: 50px;
            margin: 50px auto;
        }

        .moving-ball {
            width: 50px;
            height: 50px;
            background-color: #ff5722;
            border-radius: 50%;
            position: absolute;
            bottom: 0;
            animation: move 4s infinite alternate;
        }

        @keyframes move {
            0% {
                left: 0;
            }
            100% {
                left: calc(100% - 50px);
            }
        }
        </style>
    </head>
    <body>
        <div class="ball-container">
            <div class="moving-ball"></div>
        </div>
    </body>
</html>
