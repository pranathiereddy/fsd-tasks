<html>
    <head>
        <title>9</title>
    </head>
    <style>
        .loader {
            width: 100px;
            height: 100px;
            border: 6px solid #e0e0e0;
            border-top: 6px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

    </style>
    <body>
        <div class="loader"></div>
    </body>
</html>
