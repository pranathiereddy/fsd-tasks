<html>
<head>
  <title>7</title>
  <style>
    nav a{
      display: inline-block;
      margin: 0 10px;
      color:black;
      font-size: 16px;
      position: relative;
      transition: color 0.3s ease, font-size 0.3s ease;
    }

    nav a::after{
      content: "";
      position: absolute;
      left: 0;
      bottom: -4px;
      width: 100%;
      height: 2px;
      background: #1f6feb;

      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
    }

    nav a:hover{
      color: #1f6feb;
      font-size: 20px;
    }

    nav a:hover::after{
      transform: scaleX(1);
    }
  </style>
</head>
<body>
  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
  </nav>
</body>
</html>
