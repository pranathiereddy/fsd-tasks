<html>
    <head>
        <title>14</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background: #f0f4f8;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 16px;
            }
            button{
                margin: 10px;
                font: size 15px;
                font-weight: 700;
                cursor: pointer;
                transition: 0.2s;
            }
            button:hover{
                cursor:pointer;
                background-color:rgb(73, 228, 119);
            }

            .card {
                width: min(820px, 100%);
                background: #fff;
                border-radius: 12px;
                box-shadow: 0 8px 20px rgba(0,0,0,0.08);
                overflow: hidden;
            }

            .card-inner {
                display: flex;
                align-items: stretch;
            }

            .profile-img {
                width: 300px;
                background: #e9eef6;
                padding: 18px;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .profile-img img {
                width: 170px;
                height: 170px;
                border-radius: 50%;
                object-fit: cover;
                border: 4px solid #2b6cff;
            }

            .details {
                flex: 1;
                padding: 24px;
                display: flex;
                flex-direction: column;
                justify-content: center;
                gap: 10px;
            }

            .name {
                font-size: 26px;
                font-weight: 800;
                color: #111;
            }

            .row {
                font-size: 16px;
                color: #333;
            }

            .label {
                font-weight: 700;
                color: #2b6cff;
                margin-right: 8px;
            }
            @media (max-width: 768px) {
                .card-inner {
                    flex-direction: column;
                }

                .prod-img {
                    width: 100%;

                }

                .prod-img img {
                    padding:10px;
                    width: 100px;
                    height: 100px;
                    transition:0.7s;
                }

                img:hover{
                    transform: scale(1.4);
                }

                .details {
                    padding: 18px;
                }
            }
        </style>
    </head>
    <body>
        <div class="card">
            <div class="card-inner">
                <div class="prod-img">
                    <img src="" alt="image"/>
                </div>

                <div class="details">
                    <div class="name">Product Card 1</div>
                    <div class="row"><span class="label">Name:</span> Laptop</div>
                    <div class="row"><span class="label">Price:</span> &#8377; 50000</div>
                </div>
            </div>
            <button type="submit">Buy Now</button>
        </div>
    </body>
</html>
